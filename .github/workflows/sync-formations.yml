name: Sync formations Didask

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login & fetch formations
        env:
          DIDASK_EMAIL: ${{ secrets.DIDASK_EMAIL }}
          DIDASK_PASSWORD: ${{ secrets.DIDASK_PASSWORD }}
        run: |
          curl -s -c cookies.txt -X POST \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "email=${DIDASK_EMAIL}&password=${DIDASK_PASSWORD}" \
            -L \
            "https://craif.didask.com/api/auth/signin"
          curl -s -c cookies.txt -b cookies.txt \
            "https://craif.didask.com/studio" > /dev/null
          mkdir -p public
          curl -s -b cookies.txt \
            "https://craif.didask.com/api/learning-library?progressStatuses=progress-not-started&progressStatuses=progress-in-progress&offset=0&limit=24&sortBy=priority" \
            | python3 parse_formations.py > public/formations.json

      - name: Commit si changements
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/formations.json
          git diff --staged --quiet || git commit -m "chore: sync formations Didask"
          git push
